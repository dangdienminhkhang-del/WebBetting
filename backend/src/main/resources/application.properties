# ── Database ──────────────────────────────────────────────────────────────────
spring.datasource.url=${DATABASE_URL:jdbc:mysql://localhost:3306/webbetting_db?useSSL=false&serverTimezone=UTC}
spring.datasource.username=${DATABASE_USERNAME:root}
spring.datasource.password=${DATABASE_PASSWORD:}

# ── JPA ───────────────────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.enable_lazy_load_no_trans=true
spring.jpa.open-in-view=false

# ── Server ────────────────────────────────────────────────────────────────────
# Render inject PORT env variable, fallback 8080 khi dev
server.port=${PORT:8080}

# ── JWT ───────────────────────────────────────────────────────────────────────
jwt.secret=${JWT_SECRET:epdz/g8AD+geU89//CIjUQf3qmNR0JQIwGnQTt916IQWhCu0iysUTN6cSpZWlCQDdbgszhNp5cY2a6DZIADBrw==}
jwt.expiration=${JWT_EXPIRATION:86400000}

# ── Caro game cleanup ─────────────────────────────────────────────────────────
caro.game.retention.days=3
caro.game.cleanup.enabled=true

# ── Scheduling ────────────────────────────────────────────────────────────────
spring.task.scheduling.pool.size=1

